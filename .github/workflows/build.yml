name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: [ 'main', 'dev' ]
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write
  actions: write

jobs:
  build-release:
    name: Build Signed Release APK
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "app/build/outputs/apk/release" ]; then
            echo "release_dir=app/build/outputs/apk/release" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          METADATA="$(find app/build/outputs/apk -type f -path "*/release/output-metadata.json" | head -n 1 || true)"
          if [ -n "${METADATA:-}" ]; then
            echo "release_dir=$(dirname "$METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve release APK output directory."
          find app/build/outputs/apk -maxdepth 6 -type d -print || true
          exit 1

      - name: Resolve signing key alias
        id: signing_alias
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          printf '%s' "$KEYSTORE" | base64 --decode > "$KEYSTORE_FILE"

          LISTING="$(keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null)"
          PRIVATE_ALIASES="$(
            printf '%s\n' "$LISTING" |
              awk '
                /^Alias name: / { alias = substr($0, 13) }
                /^Entry type: PrivateKeyEntry/ { print alias }
              '
          )"

          if [ -z "$PRIVATE_ALIASES" ]; then
            echo "No PrivateKeyEntry was found in the signing keystore."
            exit 1
          fi

          if printf '%s\n' "$PRIVATE_ALIASES" | grep -Fxq "$KEY_ALIAS"; then
            RESOLVED_ALIAS="$KEY_ALIAS"
          else
            RESOLVED_ALIAS="$(printf '%s\n' "$PRIVATE_ALIASES" | head -n 1)"
            echo "Configured KEY_ALIAS does not reference a PrivateKeyEntry. Using the first private key alias from the keystore."
          fi

          echo "::add-mask::$RESOLVED_ALIAS"
          echo "key_alias=$RESOLVED_ALIAS" >> "$GITHUB_OUTPUT"

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ steps.signing_alias.outputs.key_alias }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK="$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)"
          if [ -z "${SIGNED_APK:-}" ] || [ ! -f "$SIGNED_APK" ]; then
            echo "Could not find signed APK in $RELEASE_DIR"
            find "$RELEASE_DIR" -maxdepth 2 -type f -print || true
            exit 1
          fi
          mv "$SIGNED_APK" "$RELEASE_DIR/out/Hikki-release.apk"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: ${{ steps.release_dir.outputs.release_dir }}/out/Hikki-release.apk

  build-debug:
    name: Build Debug APK
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
