name: Bump to new version

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'app/build.gradle.kts'

permissions:
  contents: write
  actions: write

jobs:
  check-version:
    if: contains(github.ref, 'refs/tags') == false
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version and tag
        id: check_version
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f app/build.gradle.kts ]; then
            echo "Error: app/build.gradle.kts does not exist"
            exit 1
          fi

          NEW_VERSION="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || true)"
          if [ -z "$NEW_VERSION" ]; then
            echo "Error: Could not find versionName in app/build.gradle.kts"
            exit 1
          fi

          echo "Detected version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists. Skipping release."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$NEW_VERSION does not exist. Proceeding with release."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug output
        run: |
          echo "version_changed: ${{ steps.check_version.outputs.version_changed }}"
          echo "new_version: ${{ steps.check_version.outputs.new_version }}"

  build:
    name: Build Signed Release APK
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "app/build/outputs/apk/release" ]; then
            echo "release_dir=app/build/outputs/apk/release" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          METADATA="$(find app/build/outputs/apk -type f -path "*/release/output-metadata.json" | head -n 1 || true)"
          if [ -n "${METADATA:-}" ]; then
            echo "release_dir=$(dirname "$METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve release APK output directory."
          find app/build/outputs/apk -maxdepth 6 -type d -print || true
          exit 1

      - name: Resolve signing key alias
        id: signing_alias
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          printf '%s' "$KEYSTORE" | base64 --decode > "$KEYSTORE_FILE"

          LISTING="$(keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null)"
          PRIVATE_ALIASES="$(
            printf '%s\n' "$LISTING" |
              awk '
                /^Alias name: / { alias = substr($0, 13) }
                /^Entry type: PrivateKeyEntry/ { print alias }
              '
          )"

          if [ -z "$PRIVATE_ALIASES" ]; then
            echo "No PrivateKeyEntry was found in the signing keystore."
            exit 1
          fi

          if printf '%s\n' "$PRIVATE_ALIASES" | grep -Fxq "$KEY_ALIAS"; then
            RESOLVED_ALIAS="$KEY_ALIAS"
          else
            RESOLVED_ALIAS="$(printf '%s\n' "$PRIVATE_ALIASES" | head -n 1)"
            echo "Configured KEY_ALIAS does not reference a PrivateKeyEntry. Using the first private key alias from the keystore."
          fi

          echo "::add-mask::$RESOLVED_ALIAS"
          echo "key_alias=$RESOLVED_ALIAS" >> "$GITHUB_OUTPUT"

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ steps.signing_alias.outputs.key_alias }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK="$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)"
          if [ -z "${SIGNED_APK:-}" ] || [ ! -f "$SIGNED_APK" ]; then
            echo "Could not find signed APK in $RELEASE_DIR"
            find "$RELEASE_DIR" -maxdepth 2 -type f -print || true
            exit 1
          fi
          mv "$SIGNED_APK" "$RELEASE_DIR/out/Hikki-v${{ needs.check-version.outputs.new_version }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: ${{ steps.release_dir.outputs.release_dir }}/out/Hikki-v${{ needs.check-version.outputs.new_version }}.apk

  create-release:
    name: Create GitHub Release
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: app-release
          path: downloaded_artifacts/app-release

      - name: Resolve changelog range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)"
          if [ -n "$LAST_TAG" ]; then
            FROM_REF="$LAST_TAG"
          else
            FROM_REF="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          echo "from_ref=$FROM_REF" >> "$GITHUB_OUTPUT"
          echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.changelog_range.outputs.from_ref }}
          toTag: ${{ steps.changelog_range.outputs.to_ref }}
          configurationJson: |
            {
              "template": "# Changelog\n\n#{{CHANGELOG}}\n\n<details>\n<summary>Other changes</summary>\n\n#{{UNCATEGORIZED}}\n</details>\n",
              "pr_template": "- #{{TITLE}} - by @#{{AUTHOR}}",
              "categories": [
                { "title": "## Features", "labels": ["feat", "feature"] },
                { "title": "## Fixes", "labels": ["fix", "bug"] },
                { "title": "## Performance", "labels": ["perf"] },
                { "title": "## Refactors", "labels": ["refactor"] },
                { "title": "## Documentation", "labels": ["docs"] },
                { "title": "## Build / CI", "labels": ["build", "ci"] }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?:\\s+.*$",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find downloaded_artifacts/app-release -name "*.apk" | head -n 1)"
          if [ -z "${APK:-}" ] || [ ! -f "$APK" ]; then
            echo "Could not find release APK."
            find downloaded_artifacts -maxdepth 4 -type f -print || true
            exit 1
          fi

          cat > release_notes.md <<EOF
          ${{ steps.build_changelog.outputs.changelog }}
          EOF

          gh release create "v${{ needs.check-version.outputs.new_version }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.check-version.outputs.new_version }}" \
            --notes-file release_notes.md \
            "$APK"
